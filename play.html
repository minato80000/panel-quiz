<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パネルクイズ｜プレイ</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <h1>パネルクイズ｜プレイ</h1>
    <div class="controls">
        <a href="index.html">← 作成にもどる</a>
    </div>

    <!-- チーム設定画面 -->
    <div id="setup" class="setup card">
        <h2>チーム設定</h2>
        <label class="setup-field">チーム数
            <select id="teamCount">
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
            </select>
        </label>
        <div id="teamNames" class="team-names"></div>
        <button id="startGame" class="primary-btn">ゲーム開始</button>
    </div>

    <!-- ゲーム画面 -->
    <div id="game" class="hidden">
        <div id="scoreboard" class="scoreboard"></div>
        <div id="board" class="board"></div>
        <div id="winner" class="winner hidden"></div>
    </div>

    <!-- 出題モーダル -->
    <div id="quiz-modal" class="modal">
        <div class="modal-content">
            <p id="quizInfo" class="quiz-info"></p>
            <h2 id="quizQuestion"></h2>
            <p id="quizAnswer" class="quiz-answer hidden"></p>

            <!-- 答えを見る段階 -->
            <div id="revealRow" class="modalButtons">
                <button id="revealButton">答えを見る</button>
                <button id="closeButton">閉じる</button>
            </div>

            <!-- 加点段階（答え表示後に出る） -->
            <div id="scoreRow" class="score-row hidden">
                <p class="quiz-info">正解したチームを選んで加点</p>
                <div id="teamButtons" class="team-buttons"></div>
                <button id="noWinnerButton">正解なし</button>
            </div>
        </div>
    </div>

    <script src="js/play.js"></script>
</body>

</html>
