<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パネルクイズ｜プレイ</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <h1>パネルクイズ｜プレイ</h1>
    <div class="controls">
        <a href="index.html">← 作成にもどる</a>
    </div>

    <!-- スコアボード（プレイ中にチームを増減できる） -->
    <div id="scoreboard" class="scoreboard"></div>
    <button id="addTeam" class="add-team-btn">＋ チーム追加</button>

    <div id="board" class="board"></div>
    <div id="winner" class="winner hidden"></div>

    <!-- 出題モーダル -->
    <div id="quiz-modal" class="modal">
        <div class="modal-content">
            <p id="quizInfo" class="quiz-info"></p>
            <h2 id="quizQuestion"></h2>
            <p id="quizAnswer" class="quiz-answer hidden"></p>

            <!-- 問題を表示する段階（ルールで「即表示」をオフにしたときだけ） -->
            <div id="showQuestionRow" class="modalButtons hidden">
                <button id="showQuestionButton">問題を表示</button>
                <button id="closeButton2">閉じる</button>
            </div>

            <!-- 答えを見る段階 -->
            <div id="revealRow" class="modalButtons">
                <button id="revealButton">答えを見る</button>
                <button id="closeButton">閉じる</button>
            </div>

            <!-- 加点段階（答え表示後に出る） -->
            <div id="scoreRow" class="score-row hidden">
                <p id="scoreLabel" class="quiz-info">正解したチームを選んで加点</p>
                <div id="teamButtons" class="team-buttons"></div>
                <button id="noWinnerButton">加点せず閉じる</button>
            </div>
        </div>
    </div>

    <script src="js/play.js"></script>
</body>

</html>
